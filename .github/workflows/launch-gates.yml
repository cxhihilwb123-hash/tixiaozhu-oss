name: OSS Launch Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  launch-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --prefix frontend ci
      - run: npm --prefix admin ci
      - run: npm --prefix backend ci
      - run: npm audit --omit=dev
      - run: npm --prefix frontend audit --omit=dev
      - run: npm --prefix admin audit --omit=dev
      - run: npm --prefix backend audit --omit=dev
      - run: npm run build
      - run: npm --prefix backend run audit:question-bank
      - run: npm --prefix backend run audit:product-readiness
      - run: npm --prefix backend run audit:runtime-security
      - run: npm --prefix backend run audit:production-build
      - run: npm --prefix backend run audit:commercial-launch
        continue-on-error: true
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Launch UI audit
        run: npx playwright test backend/scripts/audit-launch-ui.spec.js --reporter=line
      - name: Interaction QA audit
        run: npx playwright test backend/scripts/audit-interaction-qa.spec.js --reporter=line
